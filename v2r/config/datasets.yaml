# Curated human & animal video sources for timeseries extraction.
# Each entry: id, subject (human|animal), license, import method, limits.
#
# Import methods:
#   direct_url  - download MP4 from a public URL
#   huggingface - stream video column from a HF dataset
#   youtube     - yt-dlp download (Creative Commons / permissive only)

data_root: data/raw

# CONTENT AUDIT 2026-07-04: every Pexels URL below was frame-inspected. The
# original category labels (walk/sports/dance/animal) did NOT match any clip;
# entries are renamed to the VERIFIED content. Duplicate downloads existed
# across the old categories (see data/raw/catalog_corrections.json).
sources:
  # --- Verified human footage (hands-only manipulation) ---------------------
  - id: human_lab_pipetting
    subject: human
    license: Pexels License
    description: >-
      VERIFIED: close-up of gloved hands pipetting into a 96-well plate
      (laboratory). Hands-only manipulation; no full body visible.
    method: direct_url
    urls:
      - https://videos.pexels.com/video-files/3195394/3195394-hd_1280_720_25fps.mp4
      - https://videos.pexels.com/video-files/3195394/3195394-hd_1920_1080_25fps.mp4

  # --- Verified non-subject scenery (VLM/geometry tests only) ---------------
  - id: scene_ocean_waves_aerial
    subject: scene
    license: Pexels License
    description: "VERIFIED: aerial drone shot of ocean waves on a beach; no people"
    method: direct_url
    urls:
      - https://videos.pexels.com/video-files/3571264/3571264-hd_1280_720_30fps.mp4

  - id: scene_smoke_macro
    subject: scene
    license: Pexels License
    description: "VERIFIED: abstract dark smoke/ink particle macro; no people"
    method: direct_url
    urls:
      - https://videos.pexels.com/video-files/3045163/3045163-hd_1920_1080_25fps.mp4

  # --- HuggingFace human / egocentric ---------------------------------------
  - id: hf_lerobot_pusht
    subject: human
    license: Apache-2.0
    description: LeRobot pusht demo (proxy manipulation motion)
    method: huggingface
    dataset: lerobot/pusht
    split: train
    video_column: observation.image
    max_episodes: 5

  - id: hf_nateraw_ucf101
    subject: human
    license: UCF-101 terms (research)
    description: UCF-101 action recognition clips (human actions)
    method: huggingface
    dataset: nateraw/ucf101
    split: train
    video_column: video
    max_episodes: 20

  # --- Former "animal" entries: VERIFIED to contain no animals --------------
  - id: scene_night_hut
    subject: scene
    license: Pexels License
    description: "VERIFIED: static night scene, stone hut with blue lamp; no animals"
    method: direct_url
    urls:
      - https://videos.pexels.com/video-files/854548/854548-hd_1280_720_25fps.mp4

  - id: scene_mountain_timelapse
    subject: scene
    license: Pexels License
    description: "VERIFIED: starry-sky timelapse over snowy mountains with tents; no animals"
    method: direct_url
    urls:
      - https://videos.pexels.com/video-files/857195/857195-hd_1280_720_25fps.mp4

  # --- HuggingFace animal ---------------------------------------------------
  - id: hf_animal_kingdom
    subject: animal
    license: Animal Kingdom dataset terms (research)
    description: Animal Kingdom action clips
    method: huggingface
    dataset: Voxel51/animal-kingdom
    split: validation
    video_column: filepath
    max_episodes: 15
    note: filepath may require local clone; falls back to direct URLs on failure

  - id: hf_ap10k
    subject: animal
    license: AP-10K terms (research)
    description: AP-10K animal pose benchmark clips
    method: huggingface
    dataset: cpone/AP-10K
    split: train
    video_column: image
    max_episodes: 10

# Extraction settings (applied by v2r extract-timeseries)
extraction:
  canonical_hz: 30.0
  human:
    model: mediapipe_pose
    min_detection_confidence: 0.5
    min_tracking_confidence: 0.5
  animal:
    model: yolo_detect_track
    yolo_weights: yolo11n.pt
    min_confidence: 0.15
    classes: null  # all COCO animal classes
