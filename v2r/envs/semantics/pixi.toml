# V2R stage env: semantics (Qwen2.5-VL served via vLLM).
# Linux CUDA host only. See NOTES.md.

[project]
name = "v2r-env-semantics"
version = "0.1.0"
description = "Qwen2.5-VL via vLLM: subtask skill labels, captions, scene tags"
channels = ["conda-forge", "nvidia"]
platforms = ["linux-64"]

[activation.env]
# Pin the MODEL revision (HF commit) instead of a git repo commit; recorded
# in the semantics manifest. TODO(operator): replace with the real revision.
PINNED_COMMIT = "PINNED_REVISION_QWEN25_VL"
V2R_VLM_MODEL = "Qwen/Qwen2.5-VL-7B-Instruct"
V2R_VLM_PORT = "8091"

[system-requirements]
cuda = "12"

[dependencies]
python = "3.10.*"
pip = "*"
git = "*"

[pypi-dependencies]
# vLLM >= 0.7.2 is required for Qwen2.5-VL support; transformers >= 4.49
# carries the Qwen2.5-VL architecture.
vllm = "==0.7.3"
transformers = ">=4.49"
qwen-vl-utils = ">=0.0.8"
ruptures = ">=1.1"          # changepoint detection on hand aperture + contacts

[tasks]
# Weights: Apache-2.0 (config/licensing.yaml: commercial: yes), so no license
# gate applies, but the ~16 GB download should still be pre-fetched
# deliberately by the operator (and its sha256 recorded), not pulled lazily
# mid-pipeline. COMMENTED OUT on purpose:
# fetch-weights = "huggingface-cli download $V2R_VLM_MODEL --revision $PINNED_COMMIT --local-dir ./weights/qwen2.5-vl-7b"

# Serve with temperature 0 enforced client-side; JSON-schema-constrained
# decoding via vLLM guided_json (the stage wrapper sends the schema).
serve = "vllm serve $V2R_VLM_MODEL --revision $PINNED_COMMIT --port $V2R_VLM_PORT --max-model-len 16384 --limit-mm-per-prompt image=8"
selftest = "python -c \"import vllm, transformers; print('semantics env ok')\""
