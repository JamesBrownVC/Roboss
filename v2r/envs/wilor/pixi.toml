# V2R stage env: hands (WiLoR, per-frame MANO).
# Linux CUDA host only. See NOTES.md. LICENSE: WiLoR weights are CC-BY-NC ->
# this env is DISABLED when licensing.permissive_only=true.

[project]
name = "v2r-env-wilor"
version = "0.1.0"
description = "WiLoR: whole-image localization and 3D MANO hand reconstruction"
channels = ["conda-forge", "nvidia"]
platforms = ["linux-64"]

[activation.env]
# TODO(operator): pin to the exact commit; recorded in the hands manifest.
PINNED_COMMIT = "PINNED_COMMIT_WILOR"
WILOR_REPO = "https://github.com/rolpotamias/WiLoR.git"
# Operator-provided MANO model (MPI registration; never scraped).
V2R_BODY_MODELS = "../../assets/body_models"

[system-requirements]
cuda = "12"

[dependencies]
python = "3.10.*"
pip = "*"
git = "*"

[pypi-options]
extra-index-urls = ["https://download.pytorch.org/whl/cu121"]

[pypi-dependencies]
torch = "==2.1.2"
torchvision = "==0.16.2"
numpy = "<2"
opencv-python-headless = ">=4.8"
smplx = ">=0.1.28"

[tasks]
clone = "git clone $WILOR_REPO tool && git -C tool checkout $PINNED_COMMIT"
install = "python -m pip install -r tool/requirements.txt"
# MANO is OPERATOR-PROVIDED (mano.is.tue.mpg.de registration; never scraped):
link-mano = "mkdir -p tool/mano_data && ln -sfn $(realpath $V2R_BODY_MODELS)/mano/MANO_RIGHT.pkl tool/mano_data/MANO_RIGHT.pkl"
selftest = "python -c \"import torch; print('wilor env ok, cuda:', torch.cuda.is_available())\""

# WiLoR pretrained weights are CC-BY-NC (config/licensing.yaml:
# commercial: no). Operator must accept the license before downloading.
# COMMENTED OUT on purpose:
# fetch-weights = "bash tool/scripts/download_models.sh"
