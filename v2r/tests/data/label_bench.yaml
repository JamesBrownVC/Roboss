# Ground-truth fixture for the label-accuracy regression bench.
#
# Written by hand after frame-by-frame inspection of every clip (contact
# sheets in workspaces/_eval_frames/). Fields:
#   video                 - path relative to the v2r repo root
#   acceptable_verdicts   - recommendation values counted as correct
#   acceptable_human      - human_present values counted as correct
#   expected_skills       - >=1 must appear in predicted non-idle segments (recall)
#   allowed_skills        - predicted non-idle skills outside this set count
#                           against precision (fabrications)
#   forbidden_skills      - any occurrence = hallucination (hard fail)
#   key_segments          - optional interval GT for boundary scoring
#                           (skills: synonym set, start_s/end_s: interval)
#   ai_generated          - report-only (known-hard; not scored)
clips:
  pipette:
    video: data/raw/human_pexels_walk/human_pexels_walk_000.mp4
    notes: real lab close-up; blue nitrile gloves defeat MediaPipe; pipetting into well plate
    acceptable_verdicts: [proceed, human_review]
    acceptable_human: [hands_only, partial]
    expected_skills: [insert, pour, place, lower, press]
    allowed_skills: [insert, pour, place, lower, press, lift, hold, grasp, reach]
    forbidden_skills: [walk, wave, cut, fold, stir]
    key_segments:
      - skills: [insert, pour, place, lower, press]
        start_s: 0.0
        end_s: 11.6
    ai_generated: false

  aigen_cup:
    video: data/syngen/web_175617/videos/e02_cam0.mp4
    notes: generated; man walks to table 0-4.5s, reaches ~4.5-6, grasps ~6, lifts cup 6.5-9.5
    acceptable_verdicts: [proceed, human_review]
    acceptable_human: [full_body, partial]
    expected_skills: [grasp, lift]
    allowed_skills: [reach, grasp, lift, hold, place, release, walk]
    forbidden_skills: [pour, cut, stir, wave]
    key_segments:
      - skills: [reach]
        start_s: 4.0
        end_s: 6.0
      - skills: [grasp]
        start_s: 5.5
        end_s: 7.0
      - skills: [lift, hold]
        start_s: 6.5
        end_s: 10.0
    ai_generated: true

  aigen_cup2:
    video: data/syngen/web_175617/videos/e01_cam0.mp4
    notes: generated; mug on table, man reaches ~2-5s, then holds mug up 5-10s
    acceptable_verdicts: [proceed, human_review]
    acceptable_human: [full_body, partial]
    expected_skills: [grasp, lift, hold]
    allowed_skills: [reach, grasp, lift, hold, place, release]
    forbidden_skills: [pour, cut, walk, wave]
    key_segments:
      - skills: [reach]
        start_s: 1.5
        end_s: 5.0
      - skills: [grasp, lift, hold]
        start_s: 4.5
        end_s: 10.0
    ai_generated: true

  veo_wave:
    video: data/syngen/veo1/videos/e00_cam0.mp4
    notes: generated (Veo); woman waves at camera ~1-3.5s; finger morphing artifacts
    acceptable_verdicts: [proceed, human_review, reject]
    acceptable_human: [full_body, partial]
    expected_skills: [wave, gesture]
    allowed_skills: [wave, gesture, idle, hold]
    forbidden_skills: [grasp, lift, pour, walk]
    key_segments:
