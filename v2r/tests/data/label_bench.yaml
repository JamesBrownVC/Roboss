        start_s: 0.8
        end_s: 3.8
    ai_generated: true

  gear_assembly:
    video: ../roboss-film/selects/C03.mp4
    notes: AI-styled workshop close-up; hands place gear on assembly ~0-4s, lift+rotate to test 4-9s
    acceptable_verdicts: [proceed, human_review]
